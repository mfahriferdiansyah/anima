# Static serving for the Anima SPA.
#
# Two things this config gets right that a naive static host does not:
#   1. SPA history fallback — deep client-side routes (/app/notes/:id,
#      /app/canvas/:id) and hard refreshes resolve to index.html instead of 404.
#   2. The standalone reader entry — dist/read.html is a real second bundle.
#      try_files matches it as a file before the SPA fallback, so /read.html
#      (the share link target) is served as itself, not the app shell.
#
# WebAssembly (@mysten/walrus-wasm) is served via the default mime.types, which
# in current nginx maps .wasm -> application/wasm (required for
# WebAssembly.instantiateStreaming).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Hashed build assets are content-addressed, so cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Real files (read.html, covers, favicon) served as-is; everything else
    # falls back to the SPA shell so client-side routing survives a refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
